<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Come Mingle, Bring Your Singles">
  <title>Come Mingle, Bring Your Singles · Friday June 19 · Schoolyard · Denver</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Wristband stripe band, top — kept literal because they represent actual wristband colors at the door -->
  <rect x="0" y="0"  width="1200" height="10" fill="#08F26E"/>
  <rect x="0" y="10" width="1200" height="10" fill="#FF2E63"/>
  <rect x="0" y="20" width="1200" height="10" fill="#FFD400"/>
  <rect x="0" y="30" width="1200" height="10" fill="#3D7BB8"/>

  <!-- Headline (uniform size, no cartoon stroke) -->
  <g font-family="'Helvetica Neue', Arial Black, Helvetica, sans-serif" font-weight="800">
    <text x="80" y="200" font-size="84" fill="#D94364" letter-spacing="-1.5">COME MINGLE,</text>
    <text x="80" y="296" font-size="84" fill="#D94364" letter-spacing="-1.5">BRING YOUR</text>
    <text x="80" y="392" font-size="84" fill="#D94364" letter-spacing="-1.5">SINGLES.</text>

    <!-- Tagline -->
    <text x="80" y="438" font-size="18" fill="#F8F2E4" font-weight="700" letter-spacing="5" opacity="0.85">— DATING IN PERSON —</text>

    <!-- Date stamp pill -->
    <rect x="80" y="478" width="450" height="64" rx="4" fill="#D94364"/>
    <text x="105" y="522" font-size="28" fill="#F8F2E4" font-weight="800" letter-spacing="3">FRI · JUN 19 · 5–9 PM</text>

    <!-- Where -->
    <text x="80" y="582" font-size="18" fill="#F8F2E4" font-weight="700" letter-spacing="4">SCHOOLYARD BEER HALL · DENVER · 21+ · 100 SPOTS · NO COVER</text>
  </g>

  <!-- Bottom co-brand line -->
  <text x="600" y="618" text-anchor="middle"
        font-family="'Helvetica Neue', Arial Black, Helvetica, sans-serif" font-weight="700"
        font-size="13" fill="#DDD6C8" letter-spacing="3">SCHOOLYARD ✕ FRESH BARBERSHOP DENVER · BRINGYOURSINGLES.COM</text>
</svg>
