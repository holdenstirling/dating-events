<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Come Mingle, Bring Your Singles">
  <title>Come Mingle, Bring Your Singles · Thursday June 11 · Bierstadt Lagerhaus · Denver</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Sticker stripe band -->
  <rect x="0" y="0"  width="1200" height="10" fill="#08F26E"/>
  <rect x="0" y="10" width="1200" height="10" fill="#FF2E63"/>
  <rect x="0" y="20" width="1200" height="10" fill="#FFD400"/>
  <rect x="0" y="30" width="1200" height="10" fill="#3D7BB8"/>

  <!-- Headline (zero letter-spacing for safe rendering at any size) -->
  <g font-family="DejaVu Sans, Helvetica Neue, Arial Black, Helvetica, sans-serif" font-weight="700">
    <text x="70" y="180" font-size="86" fill="#D94364">COME MINGLE,</text>
    <text x="70" y="272" font-size="86" fill="#D94364">BRING YOUR</text>
    <text x="70" y="364" font-size="86" fill="#D94364">SINGLES.</text>

    <text x="70" y="412" font-size="20" fill="#F8F2E4">DATING IN PERSON.</text>

    <!-- Date stamp pill -->
    <rect x="70" y="436" width="500" height="60" rx="4" fill="#D94364"/>
    <text x="98" y="478" font-size="26" fill="#F8F2E4">THU · JUN 11 · 6:30 to 9:30 PM</text>

    <!-- Where line -->
    <text x="70" y="540" font-size="18" fill="#F8F2E4">BIERSTADT LAGERHAUS · DENVER · 21+ · 100 SPOTS · NO COVER</text>
  </g>

  <!-- Bottom co brand line, centered, well below the where line -->
  <text x="600" y="596" text-anchor="middle"
        font-family="DejaVu Sans, Helvetica Neue, Arial Black, Helvetica, sans-serif" font-weight="700"
        font-size="15" fill="#B4AFA5">BIERSTADT LAGERHAUS  X  FRESH BARBERSHOP DENVER  ·  BRINGYOURSINGLES.COM</text>
</svg>
