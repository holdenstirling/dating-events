<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Come Mingle, Bring Your Singles">
  <title>Come Mingle, Bring Your Singles · Friday June 19 · Schoolyard · Denver</title>
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FF2E63" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Wristband stripe band, top -->
  <rect x="0" y="0" width="1200" height="14" fill="#08F26E"/>
  <rect x="0" y="14" width="1200" height="14" fill="#FF2E63"/>
  <rect x="0" y="28" width="1200" height="14" fill="#FFD400"/>
  <rect x="0" y="42" width="1200" height="14" fill="#3D7BB8"/>

  <!-- Headline -->
  <g font-family="'Helvetica Neue', Arial Black, Helvetica, sans-serif" font-weight="900">
    <text x="80" y="190" font-size="74" fill="#FF2E63" letter-spacing="-2">COME MINGLE,</text>
    <text x="80" y="270" font-size="84" fill="#FF2E63" letter-spacing="-2">BRING YOUR</text>
    <text x="80" y="382" font-size="120" fill="#FF2E63" letter-spacing="-3"
          stroke="#0A0A0A" stroke-width="3">SINGLES.</text>

    <!-- Tagline -->
    <text x="80" y="430" font-size="22" fill="#08F26E" letter-spacing="8">— DATING IN PERSON —</text>

    <!-- Date stamp pill -->
    <rect x="80" y="468" width="540" height="74" fill="#FF2E63"/>
    <text x="105" y="520" font-size="34" fill="#0A0A0A" letter-spacing="3">FRI · JUN 19 · 5–9 PM</text>

    <!-- Where -->
    <text x="80" y="582" font-size="20" fill="#F8F2E4" font-weight="700" letter-spacing="5">SCHOOLYARD BEER HALL · DENVER · 21+ · 100 SPOTS · NO COVER</text>
  </g>

  <!-- "No apps. Show up." stickers, top right -->
  <g font-family="'Helvetica Neue', Arial Black, Helvetica, sans-serif" font-weight="900">
    <g transform="translate(880 100) rotate(-6)">
      <rect x="-130" y="-30" width="260" height="60" fill="#FF2E63"/>
      <text x="0" y="10" text-anchor="middle" font-size="28" fill="#0A0A0A" letter-spacing="2">FRIENDS.</text>
    </g>
    <g transform="translate(1030 200) rotate(7)">
      <rect x="-130" y="-30" width="260" height="60" fill="#F8F2E4"/>
      <text x="0" y="10" text-anchor="middle" font-size="28" fill="#0A0A0A" letter-spacing="2">OF FRIENDS.</text>
    </g>
  </g>

  <!-- Bottom co-brand line -->
  <text x="600" y="615" text-anchor="middle"
        font-family="'Helvetica Neue', Arial Black, Helvetica, sans-serif" font-weight="900"
        font-size="14" fill="#F8F2E4" letter-spacing="4">SCHOOLYARD ✕ FRESH BARBERSHOP DENVER · BRINGYOURSINGLES.COM</text>
</svg>
